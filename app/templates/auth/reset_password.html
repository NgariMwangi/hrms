{% extends "layouts/auth_base.html" %}
{% block auth_content %}
<form method="post" action="{{ url_for('auth.reset_password', token=token) }}">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
    <div class="mb-3">
        <label class="form-label">New Password</label>
        <input type="password" name="password" class="form-control" required>
        {% if form.password.errors %}<div class="text-danger small">{{ form.password.errors[0] }}</div>{% endif %}
    </div>
    <div class="mb-3">
        <label class="form-label">Confirm Password</label>
        <input type="password" name="confirm" class="form-control" required>
        {% if form.confirm.errors %}<div class="text-danger small">{{ form.confirm.errors[0] }}</div>{% endif %}
    </div>
    <button type="submit" class="btn btn-primary w-100">Reset Password</button>
</form>
{% endblock %}
