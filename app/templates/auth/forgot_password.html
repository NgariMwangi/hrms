{% extends "layouts/auth_base.html" %}
{% block auth_content %}
<form method="post" action="{{ url_for('auth.forgot_password') }}">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
    <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" name="email" class="form-control" required value="{{ form.email.data or '' }}">
        {% if form.email.errors %}<div class="text-danger small">{{ form.email.errors[0] }}</div>{% endif %}
    </div>
    <button type="submit" class="btn btn-primary w-100">Send Reset Link</button>
</form>
<p class="text-center mt-3"><a href="{{ url_for('auth.login') }}">Back to login</a></p>
{% endblock %}
