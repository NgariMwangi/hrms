{% extends "layouts/base.html" %}
{% block title %}Add Job Title - {{ app_name }}{% endblock %}
{% block content %}
<h1 class="h4 mb-4 fw-600 text-dark">Add Job Title</h1>
<div class="card">
    <div class="card-body">
        <form method="post" action="{{ url_for('job_titles.create') }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
            <div class="row g-3">
                <div class="col-md-4">
                    <label class="form-label">Code *</label>
                    <input type="text" name="code" class="form-control" required maxlength="50" value="{{ form.code.data or '' }}" placeholder="e.g. MGR">
                    {% if form.code.errors %}<div class="text-danger small">{{ form.code.errors[0] }}</div>{% endif %}
                </div>
                <div class="col-md-8">
                    <label class="form-label">Name *</label>
                    <input type="text" name="name" class="form-control" required maxlength="200" value="{{ form.name.data or '' }}" placeholder="e.g. Manager">
                    {% if form.name.errors %}<div class="text-danger small">{{ form.name.errors[0] }}</div>{% endif %}
                </div>
                <div class="col-md-6">
                    <label class="form-label">Grade</label>
                    <input type="text" name="grade" class="form-control" maxlength="50" value="{{ form.grade.data or '' }}" placeholder="e.g. G5, G6">
                </div>
                <div class="col-12">
                    <label class="form-label">Description</label>
                    <textarea name="description" class="form-control" rows="3" maxlength="2000">{{ form.description.data or '' }}</textarea>
                </div>
                <div class="col-12">
                    <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg me-1"></i>Save Job Title</button>
                    <a href="{{ url_for('job_titles.index') }}" class="btn btn-outline-secondary">Cancel</a>
                </div>
            </div>
        </form>
    </div>
</div>
{% endblock %}
